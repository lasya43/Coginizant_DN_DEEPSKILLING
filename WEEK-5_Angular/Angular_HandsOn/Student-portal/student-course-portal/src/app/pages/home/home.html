<div class="home-container">
  <h1>Welcome to the {{ portalName }}</h1>
  <p>Manage your courses, view your profile, and enroll in new classes all in one place.</p>
  
  <div class="search-section">
    <input [(ngModel)]="searchTerm" placeholder="Search courses...">
    <p>Searching for: {{ searchTerm }}</p>
  </div>

  <div class="actions">
    <button (click)="onEnrollClick()" [disabled]="!isPortalActive">Enroll Now</button>
    <p *ngIf="message">{{ message }}</p>
  </div>
  
  <div class="stats-row">
    <div class="stat-card">
      <h3>Courses Available</h3>
      <p class="stat-value">{{ availableCourses }}</p>
    </div>
    <div class="stat-card">
      <h3>Enrolled</h3>
      <p class="stat-value">3</p>
    </div>
    <div class="stat-card">
      <h3>GPA</h3>
      <p class="stat-value">3.8</p>
    </div>
  </div>
</div>
