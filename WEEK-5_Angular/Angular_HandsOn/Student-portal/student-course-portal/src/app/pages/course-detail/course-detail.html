<div *ngIf="course; else notFound" class="detail-container" style="background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
  <h2>{{ course.name }} Details</h2>
  <p><strong>Course Code:</strong> {{ course.code }}</p>
  <p><strong>Credits:</strong> {{ course.credits }}</p>
  <p><strong>Status:</strong> {{ course.gradeStatus }}</p>
</div>
<ng-template #notFound>
  <p>Course not found.</p>
</ng-template>
