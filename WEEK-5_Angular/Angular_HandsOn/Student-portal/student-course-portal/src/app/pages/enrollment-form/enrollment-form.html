<div class="form-container">
  <h2>Enrollment Request Form (Template-Driven)</h2>
  
  <div *ngIf="submitted" class="success-message">
    Enrollment request submitted successfully!
  </div>

  <form #enrollForm="ngForm" (ngSubmit)="onSubmit(enrollForm)">
    
    <div class="form-group">
      <label for="studentName">Student Name:</label>
      <input type="text" id="studentName" name="studentName" ngModel required minlength="3" #nameCtrl="ngModel">
      <span class="error-text" *ngIf="nameCtrl.touched && nameCtrl.errors?.['required']">Name is required</span>
      <span class="error-text" *ngIf="nameCtrl.touched && nameCtrl.errors?.['minlength']">Name must be at least 3 characters</span>
    </div>

    <div class="form-group">
      <label for="studentEmail">Student Email:</label>
      <input type="email" id="studentEmail" name="studentEmail" ngModel required email #emailCtrl="ngModel">
      <span class="error-text" *ngIf="emailCtrl.touched && emailCtrl.invalid">Valid email is required</span>
    </div>

    <div class="form-group">
      <label for="courseId">Course ID:</label>
      <input type="number" id="courseId" name="courseId" ngModel required #courseCtrl="ngModel">
      <span class="error-text" *ngIf="courseCtrl.touched && courseCtrl.invalid">Course ID is required</span>
    </div>

    <div class="form-group">
      <label for="preferredSemester">Preferred Semester:</label>
      <select id="preferredSemester" name="preferredSemester" ngModel required #semesterCtrl="ngModel">
        <option value="" disabled selected>Select Semester</option>
        <option value="Odd">Odd</option>
        <option value="Even">Even</option>
      </select>
      <span class="error-text" *ngIf="semesterCtrl.touched && semesterCtrl.invalid">Semester is required</span>
    </div>

    <div class="form-group checkbox-group">
      <input type="checkbox" id="agreeToTerms" name="agreeToTerms" ngModel required #termsCtrl="ngModel">
      <label for="agreeToTerms">I agree to terms and conditions</label>
      <div class="error-text" *ngIf="termsCtrl.touched && termsCtrl.invalid">You must agree to the terms</div>
    </div>

    <div class="form-actions">
      <button type="submit" [disabled]="enrollForm.invalid">Submit</button>
      <button type="button" class="btn-secondary" (click)="enrollForm.resetForm(); submitted = false">Reset</button>
    </div>
    
  </form>
</div>
