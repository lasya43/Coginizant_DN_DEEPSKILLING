<div class="form-container">
  <h2>Enrollment Request Form (Reactive)</h2>
  
  <form [formGroup]="enrollForm" (ngSubmit)="onSubmit()">
    
    <div class="form-group">
      <label for="studentName">Student Name:</label>
      <input type="text" id="studentName" formControlName="studentName">
    </div>

    <div class="form-group">
      <label for="studentEmail">Student Email:</label>
      <input type="email" id="studentEmail" formControlName="studentEmail">
      <span class="error-text" *ngIf="enrollForm.get('studentEmail')?.hasError('emailTaken')">Email taken</span>
    </div>

    <div class="form-group">
      <label for="courseId">Course ID/Code:</label>
      <input type="text" id="courseId" formControlName="courseId">
      <span class="error-text" *ngIf="enrollForm.get('courseId')?.errors?.['noCourseCode']">Course code starting with XX is not allowed.</span>
    </div>

    <div class="form-group">
      <label for="preferredSemester">Preferred Semester:</label>
      <select id="preferredSemester" formControlName="preferredSemester">
        <option value="Odd">Odd</option>
        <option value="Even">Even</option>
      </select>
    </div>

    <!-- Additional Courses FormArray -->
    <div formArrayName="additionalCourses" class="form-group">
      <label>Additional Courses</label>
      <div *ngFor="let ctrl of additionalCourses.controls; let i = index" class="dynamic-course-row" style="display: flex; gap: 0.5rem; margin-bottom: 0.5rem;">
        <input [formControlName]="i" placeholder="Course Code" style="flex: 1">
        <button type="button" class="btn-secondary" (click)="removeCourse(i)">Remove</button>
      </div>
      <button type="button" (click)="addCourse()" style="margin-top: 0.5rem">Add Another Course</button>
    </div>

    <div class="form-group checkbox-group">
      <input type="checkbox" id="agreeToTerms" formControlName="agreeToTerms">
      <label for="agreeToTerms">I agree to terms and conditions</label>
    </div>

    <div class="form-actions">
      <button type="submit" [disabled]="enrollForm.invalid">Submit</button>
    </div>
    
  </form>
</div>
